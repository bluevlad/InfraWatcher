server {
    listen 4090;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # --- /infra/ prefix 유지 시 (게이트웨이가 prefix 보존) ---

    # API proxy
    location /infra/api/ {
        proxy_pass http://backend:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy
    location /infra/ws {
        proxy_pass http://backend:9090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Static assets (prefix 유지)
    location /infra/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Redirect /infra to /infra/
    location = /infra {
        return 301 /infra/;
    }

    # --- /infra/ prefix 제거 시 (게이트웨이가 trailing / 로 prefix 제거) ---

    # API proxy (prefix 제거)
    location /api/ {
        proxy_pass http://backend:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy (prefix 제거)
    location /ws {
        proxy_pass http://backend:9090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA fallback (prefix 제거)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
