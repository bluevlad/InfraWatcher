name: Deploy to OrbStack (macOS)

on:
  push:
    branches: [ "prod" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.github/**/*.md'

jobs:
  deploy:
    name: Deploy InfraWatcher to OrbStack
    runs-on: [self-hosted, macos, orbstack]

    defaults:
      run:
        working-directory: /Users/rainend/GIT/InfraWatcher
        shell: bash

    steps:
    - name: Pull latest changes
      run: |
        git fetch origin prod
        git checkout prod
        git reset --hard origin/prod

    - name: Check if Docker restart needed
      id: check-docker
      run: |
        changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FIRST_DEPLOY")
        echo "Changed files:"
        echo "$changed_files"

        need_restart=false
        if [ "$changed_files" = "FIRST_DEPLOY" ]; then
          need_restart=true
        else
          for file in $changed_files; do
            case "$file" in
              backend/*|frontend/*|docker-compose.yml|.env*)
                need_restart=true
                echo "Docker restart needed: $file"
                break
                ;;
            esac
          done
        fi

        echo "Need Docker restart: $need_restart"
        echo "need_restart=$need_restart" >> $GITHUB_OUTPUT

    - name: Stop existing containers
      if: steps.check-docker.outputs.need_restart == 'true'
      run: docker compose down --remove-orphans
      continue-on-error: true

    - name: Build and start containers
      if: steps.check-docker.outputs.need_restart == 'true'
      run: docker compose up -d --build

    - name: Wait for backend health check
      if: steps.check-docker.outputs.need_restart == 'true'
      run: |
        echo "Waiting for backend to be healthy..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:9090/api/health > /dev/null 2>&1; then
            echo "Backend is healthy!"
            curl -s http://localhost:9090/api/health | python3 -m json.tool
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Backend health check timeout"
            docker compose logs backend --tail=50
            exit 1
          fi
          sleep 2
        done

    - name: Verify frontend
      if: steps.check-docker.outputs.need_restart == 'true'
      run: |
        echo "Checking frontend..."
        for i in $(seq 1 15); do
          if curl -sf http://localhost:4090/ > /dev/null 2>&1; then
            echo "Frontend is serving!"
            break
          fi
          if [ $i -eq 15 ]; then
            echo "Frontend verification timeout"
            docker compose logs frontend --tail=30
            exit 1
          fi
          sleep 2
        done

    - name: Verify monitoring targets
      if: steps.check-docker.outputs.need_restart == 'true'
      run: |
        echo "Checking container monitoring..."
        CONTAINER_COUNT=$(curl -sf http://localhost:9090/api/containers | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
        echo "Monitoring $CONTAINER_COUNT containers"

        HEALTH_RESULTS=$(curl -sf http://localhost:9090/api/healthchecks | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        healthy = sum(1 for h in data if h['status'] == 'healthy')
        print(f'{healthy}/{len(data)} healthy')
        " 2>/dev/null || echo "N/A")
        echo "Health checks: $HEALTH_RESULTS"

    - name: Deployment summary
      if: steps.check-docker.outputs.need_restart == 'true'
      run: |
        echo "=========================================="
        echo "  InfraWatcher Deployment Complete"
        echo "=========================================="
        echo "Frontend:  http://localhost:4090"
        echo "Backend:   http://localhost:9090"
        echo "API Docs:  http://localhost:9090/docs"
        echo ""
        docker compose ps

    - name: Skip Docker restart (docs/config only)
      if: steps.check-docker.outputs.need_restart != 'true'
      run: |
        echo "=========================================="
        echo "Docker restart SKIPPED"
        echo "Only docs/config files were changed"
        echo "=========================================="

    - name: Cleanup old images
      if: always()
      run: docker image prune -f 2>/dev/null || true
