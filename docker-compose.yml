services:
  backend:
    build: ./backend
    container_name: infrawatcher-backend
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backend-data:/app/data
    environment:
      - IW_DB_PATH=/app/data/infrawatcher.db
      - IW_DOCKER_SOCKET=/var/run/docker.sock
      - IW_HEALTHCHECK_HOST=host.docker.internal
      - IW_METRICS_INTERVAL=10
      - IW_HEALTHCHECK_INTERVAL=30
      # Auth (값은 호스트의 .env 파일에서 보간 — git에 커밋 X)
      - IW_GOOGLE_CLIENT_ID=${IW_GOOGLE_CLIENT_ID:-}
      - IW_JWT_SECRET=${IW_JWT_SECRET:-change-me-in-production}
      - IW_JWT_EXPIRE_MINUTES=${IW_JWT_EXPIRE_MINUTES:-480}
      - IW_SUPER_ADMIN_EMAILS=${IW_SUPER_ADMIN_EMAILS:-}
      # LogAnalyzer thin proxy 대상 — 다른 docker network이라 host.docker.internal 경유
      - IW_LOGANALYZER_BASE_URL=${IW_LOGANALYZER_BASE_URL:-http://host.docker.internal:9092}
      - IW_LOGANALYZER_TIMEOUT=${IW_LOGANALYZER_TIMEOUT:-5.0}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: infrawatcher-frontend
    restart: always
    ports:
      - "4090:4090"
    depends_on:
      - backend

volumes:
  backend-data:
